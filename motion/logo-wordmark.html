<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello paint · wordmark motion</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root{--paper:#FBF4E8;--ink:#312B3D;--sun:#F6C744;}
  *{box-sizing:border-box;}html,body{margin:0;height:100%;}
  body{background:#211C29;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:"Nunito Sans",sans-serif;padding:24px;}
  #stage{position:relative;width:min(86vmin,640px);aspect-ratio:1/1;}
  .framewrap{border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4);}
  #stage svg{display:block;width:100%;height:100%;}
  .controls{display:flex;gap:10px;align-items:center;}
  button{font-family:"Nunito Sans",sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:var(--paper);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;}
  button:hover{background:var(--sun);}
  .cap{color:#9a93a3;font-size:12.5px;font-weight:700;letter-spacing:0.04em;}
</style>
</head>
<body>
  <div id="stage"><div class="framewrap">
    <svg id="reel" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="wipe"><rect id="wiper" x="120" y="420" width="0" height="180"/></clipPath>
      </defs>
      <rect width="1000" height="1000" fill="#FBF4E8"/>
      <text x="500" y="350" text-anchor="middle" font-family="Fraunces,serif" font-style="italic" font-weight="500" font-size="46" fill="#6E6576" id="eye" opacity="0">watch it paint in</text>
      <g clip-path="url(#wipe)">
        <text x="500" y="560" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="128" letter-spacing="-3.8"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="33">paint</tspan></text>
      </g>
      <!-- brush rides the wipe edge -->
      <g id="brush" opacity="0">
        <g id="brushT">
          <rect x="-10" y="-78" width="20" height="58" rx="10" fill="#15A39A"/>
          <rect x="-15" y="-22" width="30" height="18" rx="4" fill="#312B3D"/>
          <path d="M-15 -4 L15 -4 L0 34 Z" fill="#E64C81"/>
        </g>
      </g>
      <path id="spark" d="M790 430 L796 444 L810 450 L796 456 L790 470 L784 456 L770 450 L784 444 Z" fill="#F6C744" opacity="0"/>
      <g id="dots" opacity="0">
        <circle cx="404" cy="700" r="22" fill="#E64C81"/><circle cx="468" cy="700" r="22" fill="#15A39A"/><circle cx="532" cy="700" r="22" fill="#F6C744"/><circle cx="596" cy="700" r="22" fill="#5BA86B"/>
      </g>
    </svg>
  </div></div>
  <div class="controls">
    <button id="replay">↻ replay</button>
    <button id="pause">❚❚ pause</button>
    <span class="cap">brand motion · wordmark paints in</span>
  </div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var T=3800, GAP=800, start=null, paused=false, pausedAt=0;
  var X0=150, X1=850; // wipe travel
  function ease(x){return x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
  function seg(t,a,b){if(t<=a)return 0;if(t>=b)return 1;return (t-a)/(b-a);}
  function op(el,v){el.setAttribute('opacity',v.toFixed(3));}
  function frame(now){
    if(start===null)start=now;
    if(paused){requestAnimationFrame(frame);return;}
    var t=Math.min(((now-start)%(T+GAP))/T,1);
    var fade=1-seg(t,.95,1);
    op($('eye'), (seg(t,.02,.12)*(1-seg(t,.32,.42)))*fade);
    // wipe
    var wv=ease(seg(t,.14,.6));
    var edge=X0+(X1-X0)*wv;
    $('wiper').setAttribute('width', Math.max(0,edge-120));
    // brush rides edge
    var bShow=seg(t,.14,.18)*(1-seg(t,.6,.66));
    op($('brush'), bShow*fade);
    var by=510+Math.sin(wv*Math.PI*4)*14;
    $('brushT').setAttribute('transform','translate('+edge+' '+by+') rotate(6)');
    op($('spark'), seg(t,.62,.7)*fade);
    // dots pop
    var dv=seg(t,.66,.78); op($('dots'), dv*fade);
    $('dots').setAttribute('transform','translate(500 700) scale('+(0.5+0.5*ease(dv))+') translate(-500 -700)');
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  $('replay').onclick=function(){start=null;paused=false;$('pause').textContent='❚❚ pause';};
  $('pause').onclick=function(){paused=!paused;this.textContent=paused?'▶ play':'❚❚ pause';if(!paused){start=performance.now()-pausedAt;}else{pausedAt=(performance.now()-start)%(T+GAP);}};
})();
</script>
<script src="export.js"></script>
</body>
</html>
