<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello paint · ink smile wink motion</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root{--paper:#FBF4E8;--ink:#312B3D;--berry:#E64C81;--teal:#15A39A;--sun:#F6C744;}
  *{box-sizing:border-box;}html,body{margin:0;height:100%;}
  body{background:#211C29;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:"Nunito Sans",sans-serif;padding:24px;}
  #stage{position:relative;width:min(86vmin,640px);aspect-ratio:1/1;}
  .framewrap{border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4);}
  #stage svg{display:block;width:100%;height:100%;}
  .controls{display:flex;gap:10px;align-items:center;}
  button{font-family:"Nunito Sans",sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:var(--paper);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;}
  button:hover{background:var(--sun);}
  .cap{color:#9a93a3;font-size:12.5px;font-weight:700;letter-spacing:0.04em;}
</style>
</head>
<body>
  <div id="stage"><div class="framewrap">
    <svg id="reel" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <rect width="1000" height="1000" fill="#312B3D"/>
      <g id="scene" opacity="0" transform="translate(500 500)">
        <g id="smile" transform="scale(7)">
          <path id="mouth" d="M-29 -1 Q0 30 29 -1" fill="none" stroke="#E64C81" stroke-width="14" stroke-linecap="round"/>
          <g id="eyeG"><path id="eye" d="M-3 -14 Q11 -22 25 -20" fill="none" stroke="#15A39A" stroke-width="5.4" stroke-linecap="round"/></g>
          <path id="spark" d="M31 -34 L33.4 -30.4 L37 -28 L33.4 -25.6 L31 -22 L28.6 -25.6 L25 -28 L28.6 -30.4 Z" fill="#F6C744" opacity="0"/>
        </g>
        <text x="0" y="270" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="78" letter-spacing="-2.3" opacity="0" id="word"><tspan fill="#E64C81">hello</tspan><tspan fill="#FFFDF8" dx="20">paint</tspan></text>
      </g>
    </svg>
  </div></div>
  <div class="controls">
    <button id="replay">↻ replay</button>
    <button id="pause">❚❚ pause</button>
    <span class="cap">brand motion · the smile winks</span>
  </div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var T=3600, GAP=700, start=null, paused=false, pausedAt=0;
  var mouth=$('mouth'), eye=$('eye');
  var Lm=mouth.getTotalLength(), Le=eye.getTotalLength();
  [[mouth,Lm],[eye,Le]].forEach(function(p){p[0].style.strokeDasharray=p[1];});
  function ease(x){return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}
  function seg(t,a,b){if(t<=a)return 0;if(t>=b)return 1;return ease((t-a)/(b-a));}
  function op(el,v){el.setAttribute('opacity',v.toFixed(3));}
  function frame(now){
    if(start===null)start=now;
    if(paused){requestAnimationFrame(frame);return;}
    var t=Math.min(((now-start)%(T+GAP))/T,1);
    var fade=1-seg(t,.96,1);
    op($('scene'), seg(t,0,.05)*fade);
    mouth.style.strokeDashoffset=Lm*(1-seg(t,.05,.28));
    eye.style.strokeDashoffset=Le*(1-seg(t,.28,.42));
    op($('spark'), seg(t,.42,.5)*fade);
    // wink: squish the eye vertically once
    var w=0; if(t>.58&&t<.74){var u=(t-.58)/.16; w=Math.sin(u*Math.PI);}
    $('eyeG').setAttribute('transform','translate(11 -20) scale(1 '+(1-0.92*w)+') translate(-11 20)');
    // gentle bob + spark twinkle
    var bob=Math.sin(t*Math.PI*2)*6;
    $('smile').setAttribute('transform','translate(0 '+bob+') scale(7)');
    op($('spark'), (t>.42? (0.6+0.4*Math.sin(t*Math.PI*8)):0)*seg(t,.42,.5)*fade);
    op($('word'), seg(t,.5,.62)*fade);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  $('replay').onclick=function(){start=null;paused=false;$('pause').textContent='❚❚ pause';};
  $('pause').onclick=function(){paused=!paused;this.textContent=paused?'▶ play':'❚❚ pause';if(!paused){start=performance.now()-pausedAt;}else{pausedAt=(performance.now()-start)%(T+GAP);}};
})();
</script>
<script src="export.js"></script>
</body>
</html>
