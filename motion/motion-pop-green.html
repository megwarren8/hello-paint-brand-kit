<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello paint · green pop motion</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root{--paper:#FBF4E8;--ink:#312B3D;--sun:#F6C744;}
  *{box-sizing:border-box;}html,body{margin:0;height:100%;}
  body{background:#211C29;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:"Nunito Sans",sans-serif;padding:24px;}
  #stage{position:relative;width:min(86vmin,640px);aspect-ratio:1/1;}
  .framewrap{border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4);}
  #stage svg{display:block;width:100%;height:100%;}
  .controls{display:flex;gap:10px;align-items:center;}
  button{font-family:"Nunito Sans",sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:var(--paper);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;}
  button:hover{background:var(--sun);}
  .cap{color:#9a93a3;font-size:12.5px;font-weight:700;letter-spacing:0.04em;}
</style></head>
<body>
  <div id="stage"><div class="framewrap">
    <svg id="reel" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <rect width="1000" height="1000" fill="#5BA86B"/>
      <g id="bub" opacity="0" transform="translate(500 430)">
        <g transform="scale(5) translate(-50 -42)">
          <rect x="14" y="14" width="72" height="52" rx="18" fill="#FFFDF8"/>
          <path d="M30 60 L24 82 L46 64 Z" fill="#FFFDF8"/>
        </g>
      </g>
      <g id="dots"></g>
      <text x="500" y="780" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="84" letter-spacing="-2.5" opacity="0" id="word"><tspan fill="#E64C81">hello</tspan><tspan fill="#FFFDF8" dx="22">paint</tspan></text>
    </svg>
  </div></div>
  <div class="controls"><button id="replay">↻ replay</button><button id="pause">❚❚ pause</button><span class="cap">brand motion · the bubble pops</span></div>
<script>
(function(){var $=function(i){return document.getElementById(i);};var T=3600,GAP=700,start=null,paused=false,pausedAt=0;
var dotcols=['#E64C81','#15A39A','#F6C744','#5BA86B','#312B3D'];
var pos=[[425,400],[500,385],[575,400],[460,455],[540,455]];var g=$('dots'),dn=[];
pos.forEach(function(p,i){var el=document.createElementNS('http://www.w3.org/2000/svg','circle');el.setAttribute('r',28);el.setAttribute('cx',p[0]);el.setAttribute('cy',p[1]);el.setAttribute('fill',dotcols[i]);g.appendChild(el);dn.push(el);});
function ease(x){return 1-Math.pow(1-x,3);}function eb(x){return 1+2.7*Math.pow(x-1,3)+1.7*Math.pow(x-1,2);}
function seg(t,a,b){if(t<=a)return 0;if(t>=b)return 1;return (t-a)/(b-a);}function op(e,v){e.setAttribute('opacity',v.toFixed(3));}
function frame(now){if(start===null)start=now;if(paused){requestAnimationFrame(frame);return;}var t=Math.min(((now-start)%(T+GAP))/T,1);var fade=1-seg(t,.95,1);
var bv=seg(t,.04,.28);op($('bub'),(bv>0?1:0)*fade);var bs=eb(Math.min(bv,1));$('bub').setAttribute('transform','translate(500 430) scale('+bs+')');
dn.forEach(function(el,i){var s=seg(t,.3+i*.05,.46+i*.05);op(el,s*fade);var p=pos[i];el.setAttribute('transform','translate('+p[0]+' '+p[1]+') scale('+(0.2+0.8*eb(Math.min(s,1)))+') translate('+(-p[0])+' '+(-p[1])+')');});
op($('word'),seg(t,.64,.78)*fade);requestAnimationFrame(frame);}
requestAnimationFrame(frame);
$('replay').onclick=function(){start=null;paused=false;$('pause').textContent='❚❚ pause';};
$('pause').onclick=function(){paused=!paused;this.textContent=paused?'▶ play':'❚❚ pause';if(!paused){start=performance.now()-pausedAt;}else{pausedAt=(performance.now()-start)%(T+GAP);}};})();
</script><script src="export.js"></script>
</body></html>
