<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello paint · palette motion</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root{--paper:#FBF4E8;--ink:#312B3D;--sun:#F6C744;}
  *{box-sizing:border-box;}html,body{margin:0;height:100%;}
  body{background:#211C29;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:"Nunito Sans",sans-serif;padding:24px;}
  #stage{position:relative;width:min(86vmin,640px);aspect-ratio:1/1;}
  .framewrap{border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4);}
  #stage svg{display:block;width:100%;height:100%;}
  .controls{display:flex;gap:10px;align-items:center;}
  button{font-family:"Nunito Sans",sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:var(--paper);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;}
  button:hover{background:var(--sun);}
  .cap{color:#9a93a3;font-size:12.5px;font-weight:700;letter-spacing:0.04em;}
</style>
</head>
<body>
  <div id="stage"><div class="framewrap">
    <svg id="reel" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <rect width="1000" height="1000" fill="#312B3D"/>
      <text x="500" y="360" text-anchor="middle" font-family="Fraunces,serif" font-style="italic" font-weight="500" font-size="50" fill="#F6C744" id="eye" opacity="0">five colors, one studio</text>
      <g id="dabs"></g>
      <text x="500" y="720" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="92" letter-spacing="-2.8" opacity="0" id="word"><tspan fill="#E64C81">hello</tspan><tspan fill="#FBF4E8" dx="24">paint</tspan></text>
    </svg>
  </div></div>
  <div class="controls">
    <button id="replay">↻ replay</button>
    <button id="pause">❚❚ pause</button>
    <span class="cap">brand motion · dabs form the palette</span>
  </div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var T=4200, GAP=800, start=null, paused=false, pausedAt=0;
  var cols=['#E64C81','#15A39A','#F6C744','#5BA86B','#BFE6F2'];
  var cx=500, gap=92, baseY=520, R=40;
  var startX=cx-(cols.length-1)*gap/2;
  // build dabs
  var g=$('dabs'), nodes=[];
  cols.forEach(function(c,i){
    var el=document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('r',R);el.setAttribute('fill',c);el.setAttribute('cx',startX+i*gap);
    g.appendChild(el);nodes.push(el);
  });
  function ease(x){return 1-Math.pow(1-x,3);}
  function seg(t,a,b){if(t<=a)return 0;if(t>=b)return 1;return (t-a)/(b-a);}
  function op(el,v){el.setAttribute('opacity',v.toFixed(3));}
  function frame(now){
    if(start===null)start=now;
    if(paused){requestAnimationFrame(frame);return;}
    var t=Math.min(((now-start)%(T+GAP))/T,1);
    var fade=1-seg(t,.95,1);
    op($('eye'), seg(t,.02,.12)*fade);
    nodes.forEach(function(el,i){
      var s=seg(t,.12+i*.07,.42+i*.07); // each dab falls staggered
      var prog=ease(Math.min(s,1));
      var y=-80+(baseY+80)*prog;
      // bounce: after landing add a damped sine
      var land=seg(t,.42+i*.07,.6+i*.07);
      var bounce=land>0&&land<1?Math.sin(land*Math.PI*3)*30*(1-land):0;
      y=Math.min(y,baseY)+ (prog>=1?bounce:0);
      // squash on impact
      var sq=prog>=1&&land<.3?(1+0.35*Math.sin(land/.3*Math.PI)):1;
      el.setAttribute('cy',y);
      el.setAttribute('transform','translate('+(startX+i*gap)+' '+y+') scale('+(2-sq)+' '+sq+') translate('+(-(startX+i*gap))+' '+(-y)+')');
      op(el, (s>0?1:0)*fade);
    });
    op($('word'), seg(t,.72,.84)*fade);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  $('replay').onclick=function(){start=null;paused=false;$('pause').textContent='❚❚ pause';};
  $('pause').onclick=function(){paused=!paused;this.textContent=paused?'▶ play':'❚❚ pause';if(!paused){start=performance.now()-pausedAt;}else{pausedAt=(performance.now()-start)%(T+GAP);}};
})();
</script>
<script src="export.js"></script>
</body>
</html>
