<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello paint · berry motion</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root{--paper:#FBF4E8;--ink:#312B3D;--sun:#F6C744;}
  *{box-sizing:border-box;}html,body{margin:0;height:100%;}
  body{background:#211C29;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:"Nunito Sans",sans-serif;padding:24px;}
  #stage{position:relative;width:min(86vmin,640px);aspect-ratio:1/1;}
  .framewrap{border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4);}
  #stage svg{display:block;width:100%;height:100%;}
  .controls{display:flex;gap:10px;align-items:center;}
  button{font-family:"Nunito Sans",sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:var(--paper);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;}
  button:hover{background:var(--sun);}
  .cap{color:#9a93a3;font-size:12.5px;font-weight:700;letter-spacing:0.04em;}
</style></head>
<body>
  <div id="stage"><div class="framewrap">
    <svg id="reel" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <rect width="1000" height="1000" fill="#E64C81"/>
      <g id="scene" opacity="0">
        <g transform="translate(500 560) scale(7)">
          <path id="mouth" d="M-29 -1 Q0 30 29 -1" fill="none" stroke="#FFFDF8" stroke-width="14" stroke-linecap="round"/>
          <path id="eye" d="M-3 -14 Q11 -22 25 -20" fill="none" stroke="#FFFDF8" stroke-width="5.4" stroke-linecap="round"/>
        </g>
        <g id="heart" opacity="0"><path d="M500 360 L440 300 C410 270 430 220 470 230 C485 234 498 248 500 262 C502 248 515 234 530 230 C570 220 590 270 560 300 Z" fill="#FFFDF8"/></g>
        <path id="spark" d="M610 250 L618 272 L640 280 L618 288 L610 310 L602 288 L580 280 L602 272 Z" fill="#F6C744" opacity="0"/>
        <text x="500" y="800" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="78" letter-spacing="-2.3" opacity="0" id="word"><tspan fill="#FFFDF8">hello</tspan><tspan fill="#FFFDF8" dx="20">paint</tspan></text>
      </g>
    </svg>
  </div></div>
  <div class="controls"><button id="replay">↻ replay</button><button id="pause">❚❚ pause</button><span class="cap">brand motion · love, painted in</span></div>
<script>
(function(){var $=function(i){return document.getElementById(i);};var T=3800,GAP=700,start=null,paused=false,pausedAt=0;
var mouth=$('mouth'),eye=$('eye'),Lm=mouth.getTotalLength(),Le=eye.getTotalLength();mouth.style.strokeDasharray=Lm;eye.style.strokeDasharray=Le;
function ease(x){return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}function eb(x){return 1+2.7*Math.pow(x-1,3)+1.7*Math.pow(x-1,2);}
function seg(t,a,b){if(t<=a)return 0;if(t>=b)return 1;return (t-a)/(b-a);}function op(e,v){e.setAttribute('opacity',v.toFixed(3));}
function frame(now){if(start===null)start=now;if(paused){requestAnimationFrame(frame);return;}var t=Math.min(((now-start)%(T+GAP))/T,1);var fade=1-seg(t,.95,1);
op($('scene'),seg(t,0,.05)*fade);mouth.style.strokeDashoffset=Lm*(1-ease(seg(t,.06,.3)));eye.style.strokeDashoffset=Le*(1-ease(seg(t,.3,.42)));
var hv=seg(t,.44,.62);op($('heart'),(hv>0?1:0)*fade);var hs=eb(Math.min(hv,1));var hy=(1-ease(seg(t,.6,.92)))* -30;$('heart').setAttribute('transform','translate(0 '+hy+') translate(500 295) scale('+hs+') translate(-500 -295)');
op($('spark'),seg(t,.62,.7)*fade*(0.6+0.4*Math.sin(t*Math.PI*9)));op($('word'),seg(t,.66,.78)*fade);requestAnimationFrame(frame);}
requestAnimationFrame(frame);
$('replay').onclick=function(){start=null;paused=false;$('pause').textContent='❚❚ pause';};
$('pause').onclick=function(){paused=!paused;this.textContent=paused?'▶ play':'❚❚ pause';if(!paused){start=performance.now()-pausedAt;}else{pausedAt=(performance.now()-start)%(T+GAP);}};})();
</script><script src="export.js"></script>
</body></html>
