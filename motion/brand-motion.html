<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello paint · brand motion</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root{--paper:#FBF4E8;--card:#FFFDF8;--ink:#312B3D;--berry:#E64C81;--teal:#15A39A;--sun:#F6C744;--leaf:#5BA86B;--sky:#BFE6F2;--muted:#6E6576;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:#211C29;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:"Nunito Sans",sans-serif;padding:24px;}
  #stage{position:relative;width:min(86vmin,640px);aspect-ratio:1/1;}
  #stage svg{display:block;width:100%;height:100%;}
  .framewrap{border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4);}
  .controls{display:flex;gap:10px;align-items:center;}
  button{font-family:"Nunito Sans",sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:var(--paper);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;letter-spacing:0.02em;}
  button:hover{background:var(--sun);}
  .cap{color:#9a93a3;font-size:12.5px;font-weight:700;letter-spacing:0.04em;}
</style>
</head>
<body>
  <div id="stage"><div class="framewrap">
    <svg id="reel" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <rect width="1000" height="1000" fill="#FBF4E8"/>
      <g id="scene" opacity="0">
        <!-- eyebrow -->
        <text id="eye1" x="500" y="170" text-anchor="middle" font-family="Fraunces,serif" font-style="italic" font-weight="500" font-size="46" fill="#6E6576">your photo,</text>
        <text id="eye2" x="500" y="170" text-anchor="middle" font-family="Fraunces,serif" font-style="italic" font-weight="600" font-size="46" fill="#E64C81" opacity="0">painted by you</text>

        <!-- frame with two panels (matted card; paint inset, no clipping) -->
        <g id="frame" opacity="0">
          <rect x="170" y="250" width="660" height="380" rx="26" fill="#FFFDF8"/>

          <!-- LEFT: the photo (always painted) -->
          <rect x="186" y="266" width="300" height="200" fill="#BFE6F2"/>
          <circle cx="252" cy="352" r="38" fill="#F6C744"/>
          <path d="M186 470 Q336 392 486 452 L486 614 L186 614 Z" fill="#5BA86B"/>

          <!-- RIGHT: numbered template that paints in -->
          <path id="r-sky" d="M514 266 L814 266 L814 466 L514 466 Z" fill="#BFE6F2" opacity="0"/>
          <circle id="r-sun" cx="580" cy="352" r="38" fill="#F6C744" opacity="0"/>
          <path id="r-hill" d="M514 470 Q664 392 814 452 L814 614 L514 614 Z" fill="#5BA86B" opacity="0"/>
          <path d="M514 470 Q664 392 814 452" fill="none" stroke="#312B3D" stroke-width="2.5"/>
          <circle cx="580" cy="352" r="38" fill="none" stroke="#312B3D" stroke-width="2.5"/>
          <text id="n1" x="700" y="372" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="44" fill="#312B3D">1</text>
          <text id="n2" x="580" y="366" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="32" fill="#312B3D">2</text>
          <text id="n3" x="654" y="566" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="44" fill="#312B3D">3</text>

          <rect x="170" y="250" width="660" height="380" rx="26" fill="none" stroke="#312B3D" stroke-width="6"/>
          <line x1="500" y1="256" x2="500" y2="624" stroke="#312B3D" stroke-width="3"/>

          <!-- brush -->
          <g id="brush" opacity="0">
            <g id="brushT">
              <rect x="-10" y="-66" width="20" height="50" rx="10" fill="#15A39A"/>
              <rect x="-14" y="-18" width="28" height="16" rx="4" fill="#312B3D"/>
              <path d="M-14 -2 L14 -2 L0 30 Z" fill="#E64C81"/>
            </g>
          </g>
        </g>

        <!-- legend dots -->
        <g id="legend">
          <g class="ld" id="ld1"><circle cx="404" cy="700" r="22" fill="#BFE6F2" stroke="#312B3D" stroke-width="2"/><text x="404" y="709" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="22" fill="#312B3D">1</text></g>
          <g class="ld" id="ld2"><circle cx="500" cy="700" r="22" fill="#F6C744"/><text x="500" y="709" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="22" fill="#312B3D">2</text></g>
          <g class="ld" id="ld3"><circle cx="596" cy="700" r="22" fill="#5BA86B"/><text x="596" y="709" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="22" fill="#312B3D">3</text></g>
        </g>

        <!-- wordmark -->
        <g id="word" opacity="0">
          <text x="500" y="812" text-anchor="middle" font-family="Nunito Sans,sans-serif" font-weight="800" font-size="92" letter-spacing="-3"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="24">paint</tspan></text>
        </g>

        <!-- smile sign-off -->
        <g id="smile" opacity="0" transform="translate(452 856) scale(0.96)">
          <path id="sm-mouth" d="M21 49 Q50 80 79 49" fill="none" stroke="#E64C81" stroke-width="14" stroke-linecap="round"/>
          <path id="sm-eye" d="M47 36 Q61 28 75 30" fill="none" stroke="#15A39A" stroke-width="5.4" stroke-linecap="round"/>
          <path id="sm-spark" d="M81 16 L83.4 19.6 L87 22 L83.4 24.4 L81 28 L78.6 24.4 L75 22 L78.6 19.6 Z" fill="#F6C744" opacity="0"/>
        </g>
      </g>
    </svg>
  </div></div>
  <div class="controls">
    <button id="replay">↻ replay</button>
    <button id="pause">❚❚ pause</button>
    <span class="cap">brand motion · photo → painted by you</span>
  </div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var T=9000, GAP=900; // loop + hold gap
  var start=null, paused=false, pausedAt=0;

  // smile path lengths for draw effect
  var mouth=$('sm-mouth'), eye=$('sm-eye');
  [mouth,eye].forEach(function(p){var L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;});

  function ease(x){return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}
  function seg(t,a,b){if(t<=a)return 0;if(t>=b)return 1;return ease((t-a)/(b-a));}
  function set(el,prop,v){if(el)el.style[prop]=v;}
  function op(el,v){if(el)el.setAttribute('opacity',v.toFixed(3));}

  function frame(now){
    if(start===null)start=now;
    if(paused){requestAnimationFrame(frame);return;}
    var elapsed=(now-start)%(T+GAP);
    var t=Math.min(elapsed/T,1); // 0..1 then hold during gap

    // global scene
    op($('scene'), seg(t,0,.04));
    var fade=1-seg(t,.965,1);

    // eyebrow
    op($('eye1'), (1-seg(t,.50,.56))*fade);
    op($('eye2'), seg(t,.50,.58)*fade);

    // frame fades in (no transform — keeps paint + border perfectly registered)
    var fp=seg(t,.04,.12);
    op($('frame'), fp*fade);

    // paint fills + number fade
    op($('r-sky'), seg(t,.16,.24)*fade);
    op($('n1'), (1-seg(t,.18,.24))*fade);
    op($('r-sun'), seg(t,.24,.32)*fade);
    op($('n2'), (1-seg(t,.26,.32))*fade);
    op($('r-hill'), seg(t,.32,.42)*fade);
    op($('n3'), (1-seg(t,.34,.42))*fade);

    // brush travels seam, top to bottom, then off
    var bv=seg(t,.12,.46);
    var bShow=seg(t,.12,.15)*(1-seg(t,.46,.50));
    op($('brush'), bShow*fade);
    var by=270+360*bv, bx=500+Math.sin(bv*Math.PI*3)*16;
    $('brushT').setAttribute('transform','translate('+bx+','+by+') rotate(8)');

    // legend dots pop (stagger)
    ['ld1','ld2','ld3'].forEach(function(id,i){
      var s=seg(t,.44+i*.03,.50+i*.03);
      var el=$(id); op(el, s*fade);
      var cx=[404,500,596][i];
      el.setAttribute('transform','translate('+cx+',700) scale('+(0.4+0.6*s)+') translate('+(-cx)+',-700)');
    });

    // wordmark slide up
    var wv=seg(t,.52,.62);
    var w=$('word'); op(w, wv*fade);
    w.setAttribute('transform','translate(0,'+(40*(1-wv))+')');

    // smile draw
    var sv=seg(t,.66,.70);
    op($('smile'), sv*fade);
    var draw=seg(t,.68,.82);
    var Lm=mouth.getTotalLength(), Le=eye.getTotalLength();
    mouth.style.strokeDashoffset=Lm*(1-draw);
    eye.style.strokeDashoffset=Le*(1-Math.max(0,(draw-.4)/.6));
    op($('sm-spark'), seg(t,.84,.90)*fade);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  $('replay').onclick=function(){start=null;paused=false;$('pause').textContent='❚❚ pause';};
  $('pause').onclick=function(){
    paused=!paused;
    this.textContent=paused?'▶ play':'❚❚ pause';
    if(!paused){ // resume: shift start so it continues
      start=performance.now()-pausedAt;
    } else { pausedAt=(performance.now()-start)%(T+GAP); }
  };
})();
</script>
<script src="export.js"></script>
</body>
</html>
