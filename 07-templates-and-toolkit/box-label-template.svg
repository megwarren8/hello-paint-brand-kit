<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <rect width="1200" height="1200" fill="#FBF4E8"/>
  <!-- smile mark -->
  <g transform="translate(84 86) scale(0.96)">
    <path d="M21 49 Q50 80 79 49" fill="none" stroke="#E64C81" stroke-width="14" stroke-linecap="round"/>
    <path d="M47 36 Q61 28 75 30" fill="none" stroke="#15A39A" stroke-width="5.4" stroke-linecap="round"/>
    <path d="M81 16 L83.4 19.6 L87 22 L83.4 24.4 L81 28 L78.6 24.4 L75 22 L78.6 19.6 Z" fill="#F6C744"/>
  </g>
  <!-- wordmark -->
  <text x="210" y="190" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="72" letter-spacing="-2.16"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="18.72">paint</tspan></text>
  <!-- kit number badge (EDITABLE) -->
  <rect x="940" y="110" width="170" height="76" rx="38" fill="#15A39A"/>
  <text x="1025" y="160" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="30" fill="#fff">no. 0042</text>
  <!-- ship-to block (EDITABLE) -->
  <rect x="120" y="320" width="960" height="300" rx="24" fill="#FFFDF8" stroke="#312B3D" stroke-width="3"/>
  <text x="160" y="385" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="22" letter-spacing="2" fill="#b89a7e">SHIP TO</text>
  <text x="160" y="450" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="40" fill="#312B3D">[full name]</text>
  <text x="160" y="508" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="600" font-size="34" fill="#312B3D">[street address]</text>
  <text x="160" y="560" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="600" font-size="34" fill="#312B3D">[city, state ZIP]</text>
  <!-- prompt line -->
  <text x="600" y="780" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-style="italic" font-weight="500" font-size="46" fill="#312B3D">your kit, painted by you</text>
  <text x="600" y="850" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="700" font-size="30" fill="#6E6576">turn the page and start at 1</text>
  <!-- return / handle line (EDITABLE) -->
  <line x1="120" y1="980" x2="1080" y2="980" stroke="#EADCC6" stroke-width="2"/>
  <text x="120" y="1040" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="700" font-size="28" fill="#6E6576">hellopaint.studio</text>
  <text x="1080" y="1040" text-anchor="end" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="700" font-size="28" fill="#6E6576">@hellopaint</text>
  <circle cx="528" cy="1090" r="14" fill="#E64C81"/>
  <circle cx="576" cy="1090" r="14" fill="#15A39A"/>
  <circle cx="624" cy="1090" r="14" fill="#F6C744"/>
  <circle cx="672" cy="1090" r="14" fill="#5BA86B"/>
</svg>
