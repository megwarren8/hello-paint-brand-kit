<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <rect width="1080" height="1920" fill="#FBF4E8"/>
  <!-- confetti dots -->
  <g opacity="0.16">
    <circle cx="120" cy="220" r="12" fill="#E64C81"/><circle cx="960" cy="180" r="10" fill="#15A39A"/>
    <circle cx="980" cy="1700" r="12" fill="#F6C744"/><circle cx="130" cy="1760" r="11" fill="#5BA86B"/>
    <circle cx="540" cy="140" r="9" fill="#15A39A"/><circle cx="90" cy="980" r="10" fill="#FBD0DD"/>
    <circle cx="990" cy="980" r="10" fill="#E64C81"/><circle cx="540" cy="1820" r="9" fill="#5BA86B"/>
  </g>
  <!-- photo drop zone (EDITABLE) -->
  <rect x="120" y="300" width="840" height="700" rx="36" fill="#FFFFFF" stroke="#D9B79A" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="540" y="660" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="32" letter-spacing="2" fill="#b89a7e">DROP A PHOTO HERE</text>
  <!-- HEADLINE (EDITABLE) -->
  <text x="540" y="1200" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-weight="600" font-size="88" letter-spacing="-2.2" fill="#E64C81">your headline</text>
