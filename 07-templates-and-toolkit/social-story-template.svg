  <rect x="340" y="1430" width="400" height="110" rx="55" fill="#E64C81"/>
  <text x="540" y="1500" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="40" fill="#FFFFFF">shop now</text>
  <!-- smile mark + wordmark -->
  <g transform="translate(496 1620) scale(0.85)">
    <path d="M21 49 Q50 80 79 49" fill="none" stroke="#E64C81" stroke-width="14" stroke-linecap="round"/>
    <path d="M47 36 Q61 28 75 30" fill="none" stroke="#15A39A" stroke-width="5.4" stroke-linecap="round"/>
    <path d="M81 16 L83.4 19.6 L87 22 L83.4 24.4 L81 28 L78.6 24.4 L75 22 L78.6 19.6 Z" fill="#F6C744"/>
