  <text x="540" y="1820" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="52" letter-spacing="-1.56"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="13.52">paint</tspan></text>
