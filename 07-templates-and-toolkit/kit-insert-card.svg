<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1050" width="1500" height="1050">
  <rect width="1500" height="1050" fill="#FBF4E8"/>
  <!-- wordmark -->
  <text x="120" y="150" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="72" letter-spacing="-2.16"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="18.72">paint</tspan></text>
  <!-- kit number badge (EDITABLE) -->
  <rect x="1140" y="92" width="240" height="80" rx="40" fill="#15A39A"/>
  <text x="1260" y="146" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="34" fill="#FFFFFF">no. 0042</text>
  <line x1="120" y1="200" x2="1380" y2="200" stroke="#EADCC6" stroke-width="2"/>
  <!-- greeting (EDITABLE name) -->
  <text x="120" y="320" font-family="'Fraunces',Georgia,serif" font-weight="600" font-size="66" fill="#E64C81">welcome to your kit,</text>
  <text x="120" y="398" font-family="'Fraunces',Georgia,serif" font-style="italic" font-weight="500" font-size="52" fill="#312B3D">[first name].</text>
  <!-- three steps -->
  <g font-family="'Nunito Sans','Trebuchet MS',sans-serif" fill="#312B3D">
    <circle cx="160" cy="540" r="34" fill="#BFE6F2"/><text x="160" y="554" text-anchor="middle" font-weight="800" font-size="34">1</text>
    <text x="220" y="535" font-weight="800" font-size="34">Match a number to a number.</text>
    <text x="220" y="578" font-family="'Fraunces',Georgia,serif" font-style="italic" font-size="28" fill="#6E6576">Find the color, find the same number on the page.</text>

    <circle cx="160" cy="660" r="34" fill="#F6C744"/><text x="160" y="674" text-anchor="middle" font-weight="800" font-size="34">2</text>
    <text x="220" y="655" font-weight="800" font-size="34">Paint one color all the way through.</text>
    <text x="220" y="698" font-family="'Fraunces',Georgia,serif" font-style="italic" font-size="28" fill="#6E6576">Then rinse the brush and move to the next.</text>

    <circle cx="160" cy="780" r="34" fill="#5BA86B"/><text x="160" y="794" text-anchor="middle" font-weight="800" font-size="34">3</text>
    <text x="220" y="775" font-weight="800" font-size="34">Let it dry. The light lines disappear.</text>
    <text x="220" y="818" font-family="'Fraunces',Georgia,serif" font-style="italic" font-size="28" fill="#6E6576">No drawing needed, ever.</text>
  </g>
  <line x1="120" y1="900" x2="1380" y2="900" stroke="#EADCC6" stroke-width="2"/>
  <text x="120" y="958" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="700" font-size="26" fill="#6E6576">questions? hello@hellopaint.studio</text>
  <circle cx="1228" cy="950" r="12" fill="#E64C81"/>
  <circle cx="1268" cy="950" r="12" fill="#15A39A"/>
  <circle cx="1308" cy="950" r="12" fill="#F6C744"/>
  <circle cx="1348" cy="950" r="12" fill="#5BA86B"/>
</svg>
