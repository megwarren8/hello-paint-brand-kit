<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 1485" width="1050" height="1485">
  <rect width="1050" height="1485" fill="#FBF4E8"/>
  <!-- snapshot mark + wordmark header -->
  <g transform="translate(80 90) scale(1.1)">
    <rect x="12" y="12" width="76" height="84" rx="10" fill="#FFFDF8" stroke="#312B3D" stroke-width="3"/>
    <rect x="20" y="18" width="56" height="48" rx="5" fill="#FBF4E8"/>
    <rect x="20" y="18" width="28" height="34" fill="#BFE6F2"/>
    <circle cx="37" cy="29" r="6.3" fill="#F6C744"/>
    <path d="M20 52 Q34 43 48 50 L48 66 L20 66 Z" fill="#5BA86B"/>
    <line x1="48" y1="18" x2="48" y2="66" stroke="#312B3D" stroke-width="1.4"/>
    <path d="M48 52 Q62 43 76 50 L76 66 L48 66 Z" fill="none" stroke="#312B3D" stroke-width="1.3"/>
    <text x="55" y="33.5" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-size="12" font-weight="800" fill="#312B3D" text-anchor="middle">1</text>
    <circle cx="67" cy="29" r="7" fill="none" stroke="#312B3D" stroke-width="1.3"/>
    <text x="67" y="32.6" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-size="9.5" font-weight="800" fill="#312B3D" text-anchor="middle">2</text>
    <text x="62" y="60" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-size="12" font-weight="800" fill="#312B3D" text-anchor="middle">3</text>
  </g>
  <text x="220" y="175" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="60" letter-spacing="-1.8"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="15.6">paint</tspan></text>
  <text x="222" y="210" font-family="'Fraunces',Georgia,serif" font-style="italic" font-weight="500" font-size="22" fill="#6E6576">your photo, painted by you</text>
  <line x1="80" y1="250" x2="970" y2="250" stroke="#EADCC6" stroke-width="2"/>
  <!-- BODY AREA (EDITABLE) - guide text, delete and type your letter -->
  <text x="80" y="330" font-family="'Fraunces',Georgia,serif" font-weight="600" font-size="30" fill="#E64C81">Dear [name],</text>
  <text x="80" y="400" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="400" font-size="24" fill="#6E6576">[Body text goes here. Click this block and type your letter.</text>
  <text x="80" y="436" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="400" font-size="24" fill="#6E6576">Keep it warm and plain. Nunito Sans, plum ink for the real copy,</text>
  <text x="80" y="472" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="400" font-size="24" fill="#6E6576">never bright raspberry or teal for body text.]</text>
  <!-- footer -->
  <line x1="80" y1="1330" x2="970" y2="1330" stroke="#EADCC6" stroke-width="2"/>
  <text x="80" y="1388" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="700" font-size="22" fill="#6E6576">hello@hellopaint.studio</text>
  <text x="970" y="1388" text-anchor="end" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="700" font-size="22" fill="#6E6576">hellopaint.studio</text>
  <circle cx="456" cy="1382" r="9" fill="#E64C81"/>
  <circle cx="490" cy="1382" r="9" fill="#15A39A"/>
  <circle cx="524" cy="1382" r="9" fill="#F6C744"/>
  <circle cx="558" cy="1382" r="9" fill="#5BA86B"/>
</svg>
