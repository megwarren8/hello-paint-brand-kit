<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2000" width="2000" height="2000">
  <rect width="2000" height="2000" fill="#FBF4E8"/>
  <!-- wordmark -->
  <text x="160" y="210" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="90" letter-spacing="-2.7"><tspan fill="#E64C81">hello</tspan><tspan fill="#312B3D" dx="23.4">paint</tspan></text>
  <!-- badge (EDITABLE: color count + kit no.) -->
  <rect x="1480" y="150" width="360" height="76" rx="38" fill="#15A39A"/>
  <text x="1660" y="197" text-anchor="middle" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="26" letter-spacing="1" fill="#FFFFFF">24 COLORS · NO. 0042</text>
  <!-- photo drop zone (EDITABLE: place your finished-painting photo here) -->
  <rect x="160" y="300" width="1680" height="1240" rx="36" fill="#FFFFFF" stroke="#D9B79A" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="1000" y="900" font-family="'Nunito Sans','Trebuchet MS',sans-serif" font-weight="800" font-size="40" letter-spacing="2" fill="#b89a7e" text-anchor="middle">DROP YOUR FINISHED-PAINTING PHOTO HERE</text>
  <text x="1000" y="960" font-family="'Fraunces',Georgia,serif" font-style="italic" font-size="34" fill="#c9ad92" text-anchor="middle">fill the frame; keep the dashed border showing</text>
  <!-- snapshot mark bottom-left -->
  <g transform="translate(160 1640) scale(2.2)">
    <rect x="12" y="12" width="76" height="84" rx="10" fill="#FFFDF8" stroke="#312B3D" stroke-width="3"/>
    <rect x="20" y="18" width="56" height="48" rx="5" fill="#FBF4E8"/>
    <rect x="20" y="18" width="28" height="34" fill="#BFE6F2"/>
    <circle cx="37" cy="29" r="6.3" fill="#F6C744"/>
    <path d="M20 52 Q34 43 48 50 L48 66 L20 66 Z" fill="#5BA86B"/>
    <line x1="48" y1="18" x2="48" y2="66" stroke="#312B3D" stroke-width="1.4"/>
    <path d="M48 52 Q62 43 76 50 L76 66 L48 66 Z" fill="none" stroke="#312B3D" stroke-width="1.3"/>
  </g>
  <!-- headline (EDITABLE) -->
  <text x="430" y="1740" font-family="'Fraunces',Georgia,serif" font-weight="600" font-size="64" fill="#312B3D">a paint-by-number kit,</text>
  <text x="430" y="1812" font-family="'Fraunces',Georgia,serif" font-style="italic" font-weight="500" font-size="48" fill="#6E6576">made from your own photo.</text>
  <circle cx="1682" cy="1760" r="16" fill="#E64C81"/>
  <circle cx="1734" cy="1760" r="16" fill="#15A39A"/>
  <circle cx="1786" cy="1760" r="16" fill="#F6C744"/>
  <circle cx="1838" cy="1760" r="16" fill="#5BA86B"/>
</svg>
